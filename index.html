<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work OS</title>

<style>
:root{
  --bg:#f5f3ef;
  --card:#ffffffcc;
  --text:#111;
  --muted:#888;
  --accent:#f27c5a;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.app{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.title{
  font-size:28px;
  font-weight:600;
}

.grid{
  display:grid;
  gap:20px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(14px);
  padding:24px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.big{
  font-size:36px;
  font-weight:600;
}

.small{
  color:var(--muted);
  font-size:14px;
}

.progress{
  height:6px;
  background:#eee;
  border-radius:6px;
  margin-top:12px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#f5a88e,#f27c5a);
  border-radius:6px;
}

.moods{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.moods button{
  width:50px;
  height:50px;
  border-radius:14px;
  border:none;
  background:white;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.moods button.active{
  border:2px solid var(--accent);
  background:#fff3ef;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <div class="title" id="greet"></div>
</div>

<div class="grid">

<div class="card">
  <div class="small">Today</div>
  <div class="big" id="today">0h</div>
  <div class="small" id="diff"></div>

  <div class="progress">
    <div class="fill" id="progress"></div>
  </div>
</div>

<div class="card">
  <div class="small">State of Mind</div>
  <div class="moods" id="moods"></div>
</div>

</div>

</div>

<script>
const PROXY="https://tmetric-proxy.hiankitkapoor.workers.dev"
const USER=399254

const WS1="241637"
const WS2="228817"

const today=()=>new Date().toISOString().slice(0,10)
const yesterday=()=>{
  const d=new Date()
  d.setDate(d.getDate()-1)
  return d.toISOString().slice(0,10)
}

const fmt=s=>{
  const h=Math.floor(s/3600)
  const m=Math.floor((s%3600)/60)
  return h?`${h}h ${m}m`:`${m}m`
}

async function fetchTime(ws,date){
  try{
    const url=`${PROXY}/accounts/${ws}/timeentries/${USER}?startTime=${date}T00:00:00&endTime=${date}T23:59:59&useUtcTime=false`
    const r=await fetch(url)
    const d=await r.json()
    if(!Array.isArray(d)) return 0

    return d.reduce((t,e)=>{
      if(!e.startTime||!e.endTime) return t
      return t+((new Date(e.endTime)-new Date(e.startTime))/1000)
    },0)

  }catch{
    return 0
  }
}

async function load(){
  const t1=await fetchTime(WS1,today())
  const t2=await fetchTime(WS2,today())
  const total=t1+t2

  const y1=await fetchTime(WS1,yesterday())
  const y2=await fetchTime(WS2,yesterday())
  const y=y1+y2

  document.getElementById("today").innerText=fmt(total)

  const diff=y?Math.round(((total-y)/y)*100):0
  document.getElementById("diff").innerText=
    (diff>=0?"↑ ":"↓ ")+Math.abs(diff)+"% vs yesterday"

  document.getElementById("progress").style.width=
    Math.min(100,(total/(8*3600))*100)+"%"
}

const moods=["😔","😐","🙂","😊","🤩"]

function renderMood(){
  const wrap=document.getElementById("moods")
  wrap.innerHTML=""

  moods.forEach(m=>{
    const b=document.createElement("button")
    b.innerText=m
    b.onclick=()=>b.classList.toggle("active")
    wrap.appendChild(b)
  })
}

function greet(){
  const h=new Date().getHours()
  document.getElementById("greet").innerText=
    h<12?"Good morning":
    h<17?"Good afternoon":"Good evening"
}

greet()
load()
renderMood()
</script>

</body>
</html>
