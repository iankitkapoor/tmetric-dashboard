<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Dashboard</title>
</head>

<body>

<h1 id="greet"></h1>
<div id="today">Loading...</div>

<script>
const PROXY = "https://tmetric-proxy.hiankitkapoor.workers.dev"
const USER = 399254

function today(){
  return new Date().toISOString().slice(0,10)
}

function fmt(s){
  const h=Math.floor(s/3600)
  const m=Math.floor((s%3600)/60)
  return h?`${h}h ${m}m`:`${m}m`
}

async function fetchTime(ws){
  try{
    const url=`${PROXY}/accounts/${ws}/timeentries/${USER}?startTime=${today()}T00:00:00&endTime=${today()}T23:59:59&useUtcTime=false`
    const r=await fetch(url)
    const d=await r.json()

    if(!Array.isArray(d)) return 0

    return d.reduce((t,e)=>{
      if(!e.startTime||!e.endTime) return t
      return t+((new Date(e.endTime)-new Date(e.startTime))/1000)
    },0)

  }catch(e){
    return 0
  }
}

async function load(){
  const t1=await fetchTime("241637")
  const t2=await fetchTime("228817")
  document.getElementById("today").innerText=fmt(t1+t2)
}

function greet(){
  const h=new Date().getHours()
  document.getElementById("greet").innerText=
    h<12?"Good morning":
    h<17?"Good afternoon":"Good evening"
}

greet()
load()
</script>

</body>
</html>
