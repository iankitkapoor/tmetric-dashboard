// ====== MOOD SYSTEM (FIXED - DB BASED) ======

async function saveMood(date, emoji) {
  await fetch(`${SUPABASE_URL}/rest/v1/moods`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      date: date,
      emoji: emoji
    })
  })
}

async function getMood(date) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/moods?date=eq.${date}&select=*`,
    {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    }
  )
  const data = await res.json()
  return data[0]?.emoji || null
}
