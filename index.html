<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Work Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c10;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --muted: #6b6b80;
    --accent: #7c6af7;
    --accent2: #34d399;
    --warn: #f59e0b;
    --danger: #f43f5e;
    --ws1: #7c6af7;
    --ws2: #34d399;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .mono { font-family: 'DM Mono', monospace; }

  /* ── Layout ── */
  .shell {
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
  }
  .header-left h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .header-left p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .refresh-btn:hover { background: var(--surface); }

  /* ── Workspace Badges ── */
  .ws-badges {
    display: flex;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .ws-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px 5px 10px;
    font-size: 0.78rem;
  }
  .ws-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ── Today Hero ── */
  .today-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 2rem;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
  }
  .today-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .today-label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .today-time {
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 1rem;
  }
  .today-time .unit {
    font-size: 1.5rem;
    color: var(--muted);
    font-weight: 400;
  }
  .ws-breakdown {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ws-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
  }
  .ws-chip-dot { width: 6px; height: 6px; border-radius: 50%; }
  .ws-chip-label { color: var(--muted); }
  .ws-chip-time { color: var(--text); font-weight: 500; }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.25rem 1rem;
  }
  .stat-label {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 0.6rem;
  }
  .stat-bar-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ── Mood Tracker ── */
  .mood-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.25rem;
  }
  .mood-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .mood-title { font-size: 0.9rem; font-weight: 600; }
  .mood-date {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .mood-options {
    display: flex;
    gap: 10px;
    justify-content: space-between;
  }
  .mood-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
  }
  .mood-btn:hover { border-color: var(--border2); background: #1e1e2e; }
  .mood-btn.selected {
    border-color: var(--accent);
    background: rgba(124,106,247,0.12);
  }
  .mood-emoji { font-size: 1.6rem; }
  .mood-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.3;
  }
  .mood-btn.selected .mood-label { color: var(--accent); }

  /* ── History / Log ── */
  .log-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 1.75rem;
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .log-title { font-size: 0.9rem; font-weight: 600; }
  .log-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    font-size: 0.82rem;
  }
  .log-row:last-child { border-bottom: none; }
  .log-day { color: var(--muted); font-family: 'DM Mono', monospace; min-width: 80px; }
  .log-time { font-weight: 600; font-family: 'DM Mono', monospace; }
  .log-mood { font-size: 1rem; margin-left: auto; }
  .log-ws { display: flex; gap: 6px; margin-left: 8px; }
  .log-ws-chip {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ── Loading / Error ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, #22223066 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 1em;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .error-msg {
    background: rgba(244,63,94,0.1);
    border: 1px solid rgba(244,63,94,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--danger);
    margin-bottom: 1rem;
    display: none;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── Responsive ── */
  @media (max-width: 560px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .today-time { font-size: 2.8rem; }
    .mood-options { gap: 6px; }
    .mood-emoji { font-size: 1.3rem; }
  }
  @media (max-width: 380px) {
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Work Dashboard</h1>
      <p id="last-updated">Loading...</p>
    </div>
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>

  <!-- Workspace Badges -->
  <div class="ws-badges">
    <div class="ws-badge">
      <div class="ws-dot" style="background:var(--ws1)"></div>
      <span>Workspace 1</span>
    </div>
    <div class="ws-badge">
      <div class="ws-dot" style="background:var(--ws2)"></div>
      <span>Workspace 2</span>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-box"></div>

  <!-- Today Hero -->
  <div class="today-hero" style="margin-bottom:1.25rem">
    <div class="today-label">Today's total</div>
    <div class="today-time mono" id="today-total">--h --m</div>
    <div class="ws-breakdown" id="today-breakdown">
      <div class="ws-chip">
        <div class="ws-chip-dot" style="background:var(--ws1)"></div>
        <span class="ws-chip-label">WS1</span>
        <span class="ws-chip-time" id="today-ws1">--</span>
      </div>
      <div class="ws-chip">
        <div class="ws-chip-dot" style="background:var(--ws2)"></div>
        <span class="ws-chip-label">WS2</span>
        <span class="ws-chip-time" id="today-ws2">--</span>
      </div>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">This week</div>
      <div class="stat-value mono" id="week-total" style="color:var(--accent)">--</div>
      <div class="stat-bar-track"><div class="stat-bar-fill" id="week-bar" style="background:var(--accent);width:0%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This month</div>
      <div class="stat-value mono" id="month-total" style="color:var(--warn)">--</div>
      <div class="stat-bar-track"><div class="stat-bar-fill" id="month-bar" style="background:var(--warn);width:0%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This year</div>
      <div class="stat-value mono" id="year-total" style="color:var(--danger)">--</div>
      <div class="stat-bar-track"><div class="stat-bar-fill" id="year-bar" style="background:var(--danger);width:0%"></div></div>
    </div>
  </div>

  <!-- Mood Tracker -->
  <div class="mood-card">
    <div class="mood-header">
      <div class="mood-title">How was today's work?</div>
      <div class="mood-date" id="mood-date-label"></div>
    </div>
    <div class="mood-options" id="mood-options"></div>
  </div>

  <!-- Recent Log -->
  <div class="log-card">
    <div class="log-header">
      <div class="log-title">Recent days</div>
    </div>
    <div id="log-rows">
      <div class="log-row"><div class="skeleton" style="width:60%"></div></div>
      <div class="log-row"><div class="skeleton" style="width:50%"></div></div>
      <div class="log-row"><div class="skeleton" style="width:55%"></div></div>
    </div>
  </div>

  <div class="footer" id="footer-ts"></div>
</div>

<script>
const PROXY_BASE = "https://tmetric-proxy.hiankitkapoor.workers.dev"
const API_TOKEN  = "0CCEFE6207F9E7BD5746D1FD6EE33109CF695E9281B20E72A0DF0B0EF1BBDF3E-1"
const WORKSPACES = [
  { id: "241637", name: "Workspace 1", color: "#7c6af7" },
  { id: "228817", name: "Workspace 2", color: "#34d399" },
]
const MOODS = [
  { emoji: "😔", label: "Hard day"  },
  { emoji: "😐", label: "Meh"       },
  { emoji: "🙂", label: "Decent"    },
  { emoji: "😊", label: "Good"      },
  { emoji: "🤩", label: "Amazing!"  },
]
const MOOD_KEY = "tmetric_mood_v1"
const HISTORY_DAYS = 7

/* ── Date helpers ── */
const pad = n => String(n).padStart(2,"0")
function dateStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}` }
function todayStr()  { return dateStr(new Date()) }
function offsetDate(days) {
  const d = new Date(); d.setDate(d.getDate() + days); return d
}
function weekStartStr() {
  const d = new Date()
  const day = d.getDay() || 7
  d.setDate(d.getDate() - day + 1)
  return dateStr(d)
}
function monthStartStr() {
  const d = new Date()
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-01`
}
function yearStartStr()  { return `${new Date().getFullYear()}-01-01` }

/* ── Time format ── */
function fmt(secs) {
  if (!secs || secs < 0) return "0m"
  const h = Math.floor(secs / 3600)
  const m = Math.floor((secs % 3600) / 60)
  return h > 0 ? `${h}h ${m}m` : `${m}m`
}

/* ── API ── */
async function fetchEntries(wsId, start, end) {
  const url = `${PROXY_BASE}/workspaces/${wsId}/timeentries?startDate=${start}&endDate=${end}`
  const res  = await fetch(url, { headers: { Authorization: `Bearer ${API_TOKEN}` } })
  if (!res.ok) throw new Error(`API ${res.status} for workspace ${wsId}`)
  const data = await res.json()
  if (!Array.isArray(data)) return 0
  return data.reduce((sum, e) => sum + (e.duration || 0), 0)
}

async function fetchBoth(start, end) {
  const [ws1, ws2] = await Promise.all(WORKSPACES.map(ws => fetchEntries(ws.id, start, end)))
  return { ws1, ws2, total: ws1 + ws2 }
}

/* ── Mood store (localStorage) ── */
function loadMoods() {
  try { return JSON.parse(localStorage.getItem(MOOD_KEY) || "{}") } catch { return {} }
}
function saveMood(dateKey, emoji) {
  const log = loadMoods()
  log[dateKey] = emoji
  localStorage.setItem(MOOD_KEY, JSON.stringify(log))
}
function getMood(dateKey) { return loadMoods()[dateKey] || null }

/* ── Render mood picker ── */
function renderMoodPicker() {
  const today = todayStr()
  const saved  = getMood(today)
  const wrap   = document.getElementById("mood-options")
  wrap.innerHTML = ""
  MOODS.forEach(m => {
    const btn = document.createElement("button")
    btn.className = "mood-btn" + (saved === m.emoji ? " selected" : "")
    btn.innerHTML = `<span class="mood-emoji">${m.emoji}</span><span class="mood-label">${m.label}</span>`
    btn.onclick = () => {
      saveMood(today, m.emoji)
      renderMoodPicker()
      renderLog()
    }
    wrap.appendChild(btn)
  })
  document.getElementById("mood-date-label").textContent = new Date().toLocaleDateString("en-IN", { weekday:"long", day:"numeric", month:"short" })
}

/* ── Render recent log ── */
async function renderLog() {
  const wrap   = document.getElementById("log-rows")
  const moods  = loadMoods()
  const rows   = []

  for (let i = 0; i < HISTORY_DAYS; i++) {
    const d    = offsetDate(-i)
    const ds   = dateStr(d)
    const label = i === 0 ? "Today" : i === 1 ? "Yesterday" : d.toLocaleDateString("en-IN", { weekday:"short", day:"numeric", month:"short" })
    rows.push({ ds, label, mood: moods[ds] || null })
  }

  wrap.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:0.8rem;padding:1rem">Loading recent days…</div>`

  const promises = rows.map(r => fetchBoth(r.ds, r.ds).then(d => ({ ...r, ...d })))
  const results  = await Promise.allSettled(promises)

  wrap.innerHTML = ""
  results.forEach(res => {
    if (res.status === "rejected") return
    const r   = res.value
    const row = document.createElement("div")
    row.className = "log-row"
    row.innerHTML = `
      <span class="log-day">${r.label}</span>
      <span class="log-time">${fmt(r.total)}</span>
      <div class="log-ws">
        <span class="log-ws-chip" style="border-color:${WORKSPACES[0].color}33;color:${WORKSPACES[0].color}">${fmt(r.ws1)}</span>
        <span class="log-ws-chip" style="border-color:${WORKSPACES[1].color}33;color:${WORKSPACES[1].color}">${fmt(r.ws2)}</span>
      </div>
      <span class="log-mood">${r.mood || ""}</span>
    `
    wrap.appendChild(row)
  })
}

/* ── Main load ── */
async function loadAll() {
  document.getElementById("last-updated").textContent = "Refreshing…"
  document.getElementById("error-box").style.display  = "none"

  try {
    const [day, week, month, year] = await Promise.all([
      fetchBoth(todayStr(),      todayStr()),
      fetchBoth(weekStartStr(),  todayStr()),
      fetchBoth(monthStartStr(), todayStr()),
      fetchBoth(yearStartStr(),  todayStr()),
    ])

    document.getElementById("today-total").textContent = fmt(day.total)
    document.getElementById("today-ws1").textContent   = fmt(day.ws1)
    document.getElementById("today-ws2").textContent   = fmt(day.ws2)

    document.getElementById("week-total").textContent  = fmt(week.total)
    document.getElementById("month-total").textContent = fmt(month.total)
    document.getElementById("year-total").textContent  = fmt(year.total)

    const maxSecs = year.total || 1
    setTimeout(() => {
      document.getElementById("week-bar").style.width  = Math.min(100, week.total  / maxSecs * 100) + "%"
      document.getElementById("month-bar").style.width = Math.min(100, month.total / maxSecs * 100) + "%"
      document.getElementById("year-bar").style.width  = "100%"
    }, 100)

    const ts = new Date().toLocaleTimeString("en-IN", { hour:"2-digit", minute:"2-digit" })
    document.getElementById("last-updated").textContent = `Last updated ${ts}`
    document.getElementById("footer-ts").textContent    = `TMetric Dashboard • ${new Date().toLocaleDateString("en-IN",{year:"numeric",month:"long",day:"numeric"})}`

    await renderLog()

  } catch(err) {
    const box = document.getElementById("error-box")
    box.style.display = "block"
    box.textContent   = "Could not fetch TMetric data. Check your API token or open the browser console for details. Error: " + err.message
    document.getElementById("last-updated").textContent = "Failed to load"
    console.error(err)
  }
}

/* ── Init ── */
renderMoodPicker()
loadAll()
</script>
</body>
</html>
